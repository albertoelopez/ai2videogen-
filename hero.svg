<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d0d1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed" />
      <stop offset="100%" style="stop-color:#2563eb" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#13131f;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.04" stroke="#7c3aed" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)"/>

  <!-- === STEP 1: IMAGE === -->
  <rect x="60" y="100" width="180" height="200" rx="12" fill="url(#cardGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  <!-- Image icon placeholder -->
  <rect x="80" y="130" width="140" height="100" rx="6" fill="#1e1e35" stroke="#3a3a5c" stroke-width="1"/>
  <!-- Mountain / landscape icon -->
  <polygon points="100,210 135,165 155,185 175,155 210,210" fill="#3b1f8a" opacity="0.7"/>
  <circle cx="195" cy="150" r="12" fill="#5b3fd1" opacity="0.6"/>
  <rect x="80" y="130" width="140" height="100" rx="6" fill="none" stroke="#4c1d95" stroke-width="1" opacity="0.5"/>
  <!-- Label -->
  <text x="150" y="252" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="2" font-weight="600">INPUT IMAGE</text>
  <text x="150" y="272" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" fill="#e2e8f0" font-weight="500">Any Photo</text>

  <!-- Arrow 1 -->
  <g filter="url(#glow)">
    <line x1="250" y1="200" x2="300" y2="200" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="300,194 312,200 300,206" fill="#7c3aed"/>
  </g>

  <!-- === STEP 2: WAN 2.2 === -->
  <rect x="315" y="100" width="180" height="200" rx="12" fill="url(#cardGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  <!-- Brain/AI icon -->
  <circle cx="405" cy="175" r="35" fill="#1a0f3a" stroke="#5b21b6" stroke-width="1.5"/>
  <!-- Neural network dots -->
  <circle cx="390" cy="165" r="4" fill="#7c3aed" filter="url(#glow)"/>
  <circle cx="410" cy="158" r="4" fill="#2563eb" filter="url(#glow)"/>
  <circle cx="425" cy="172" r="4" fill="#7c3aed" filter="url(#glow)"/>
  <circle cx="415" cy="188" r="4" fill="#2563eb" filter="url(#glow)"/>
  <circle cx="393" cy="185" r="4" fill="#7c3aed" filter="url(#glow)"/>
  <line x1="390" y1="165" x2="410" y2="158" stroke="#5b21b6" stroke-width="1" opacity="0.6"/>
  <line x1="410" y1="158" x2="425" y2="172" stroke="#5b21b6" stroke-width="1" opacity="0.6"/>
  <line x1="425" y1="172" x2="415" y2="188" stroke="#5b21b6" stroke-width="1" opacity="0.6"/>
  <line x1="415" y1="188" x2="393" y2="185" stroke="#5b21b6" stroke-width="1" opacity="0.6"/>
  <line x1="393" y1="185" x2="390" y2="165" stroke="#5b21b6" stroke-width="1" opacity="0.6"/>
  <line x1="390" y1="165" x2="415" y2="188" stroke="#4c1d95" stroke-width="1" opacity="0.4"/>
  <line x1="410" y1="158" x2="393" y2="185" stroke="#4c1d95" stroke-width="1" opacity="0.4"/>
  <text x="405" y="252" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="2" font-weight="600">I2V MODEL</text>
  <text x="405" y="272" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" fill="#e2e8f0" font-weight="500">Wan 2.2 GGUF</text>

  <!-- Arrow 2 -->
  <g filter="url(#glow)">
    <line x1="505" y1="200" x2="555" y2="200" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="555,194 567,200 555,206" fill="#5b21b6"/>
  </g>

  <!-- === STEP 3: VIDEO CLIP === -->
  <rect x="570" y="100" width="180" height="200" rx="12" fill="url(#cardGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  <!-- Film strip -->
  <rect x="590" y="130" width="140" height="90" rx="4" fill="#0f0f1e" stroke="#374151" stroke-width="1"/>
  <!-- Film perforations -->
  <rect x="590" y="133" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="590" y="150" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="590" y="167" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="590" y="184" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="722" y="133" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="722" y="150" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="722" y="167" width="8" height="10" rx="2" fill="#1f2937"/>
  <rect x="722" y="184" width="8" height="10" rx="2" fill="#1f2937"/>
  <!-- Play button -->
  <circle cx="660" cy="175" r="22" fill="#1e1e35" stroke="#4c1d95" stroke-width="1.5"/>
  <polygon points="653,165 653,185 674,175" fill="#7c3aed" filter="url(#glow)"/>
  <!-- Waveform below video -->
  <g opacity="0.6">
    <rect x="598" y="232" width="3" height="8" rx="1" fill="#2563eb"/>
    <rect x="604" y="228" width="3" height="16" rx="1" fill="#7c3aed"/>
    <rect x="610" y="226" width="3" height="20" rx="1" fill="#2563eb"/>
    <rect x="616" y="230" width="3" height="12" rx="1" fill="#7c3aed"/>
    <rect x="622" y="225" width="3" height="22" rx="1" fill="#2563eb"/>
    <rect x="628" y="229" width="3" height="14" rx="1" fill="#7c3aed"/>
    <rect x="634" y="227" width="3" height="18" rx="1" fill="#2563eb"/>
    <rect x="640" y="231" width="3" height="10" rx="1" fill="#7c3aed"/>
    <rect x="646" y="225" width="3" height="22" rx="1" fill="#2563eb"/>
    <rect x="652" y="228" width="3" height="16" rx="1" fill="#7c3aed"/>
    <rect x="658" y="226" width="3" height="20" rx="1" fill="#2563eb"/>
    <rect x="664" y="230" width="3" height="12" rx="1" fill="#7c3aed"/>
    <rect x="670" y="224" width="3" height="24" rx="1" fill="#2563eb"/>
    <rect x="676" y="228" width="3" height="16" rx="1" fill="#7c3aed"/>
    <rect x="682" y="226" width="3" height="20" rx="1" fill="#2563eb"/>
    <rect x="688" y="232" width="3" height="8" rx="1" fill="#7c3aed"/>
    <rect x="694" y="229" width="3" height="14" rx="1" fill="#2563eb"/>
    <rect x="700" y="226" width="3" height="20" rx="1" fill="#7c3aed"/>
    <rect x="706" y="230" width="3" height="12" rx="1" fill="#2563eb"/>
  </g>
  <text x="660" y="265" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="2" font-weight="600">OUTPUT</text>
  <text x="660" y="282" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" fill="#e2e8f0" font-weight="500">Video + Audio</text>

  <!-- Arrow 3 -->
  <g filter="url(#glow)">
    <line x1="760" y1="200" x2="810" y2="200" stroke="url(#accentGrad)" stroke-width="2" stroke-dasharray="4,3"/>
    <polygon points="810,194 822,200 810,206" fill="#2563eb"/>
  </g>

  <!-- === STEP 4: PIPELINE === -->
  <rect x="825" y="80" width="310" height="240" rx="14" fill="url(#cardGrad)" stroke="#2a2a3e" stroke-width="1.5"/>
  <rect x="825" y="80" width="310" height="3" rx="14" fill="url(#accentGrad)"/>

  <text x="980" y="115" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#6b7280" letter-spacing="3" font-weight="700">FULL PIPELINE</text>

  <!-- Pipeline steps list -->
  <g font-family="'Inter', 'Segoe UI', sans-serif" font-size="12.5" fill="#94a3b8">
    <circle cx="855" cy="145" r="4" fill="#7c3aed"/>
    <text x="870" y="149" fill="#e2e8f0">Prompt → Scene Breakdown</text>

    <circle cx="855" cy="173" r="4" fill="#5b21b6"/>
    <text x="870" y="177">FLUX.1 Text-to-Image</text>

    <circle cx="855" cy="201" r="4" fill="#2563eb"/>
    <text x="870" y="205">Wan 2.2 Image-to-Video</text>

    <circle cx="855" cy="229" r="4" fill="#1d4ed8"/>
    <text x="870" y="233">MusicGen Audio</text>

    <circle cx="855" cy="257" r="4" fill="#7c3aed"/>
    <text x="870" y="261">ffmpeg Merge → MP4</text>
  </g>

  <!-- Connector lines between pipeline steps -->
  <g stroke="#2a2a3e" stroke-width="1" opacity="0.5">
    <line x1="855" y1="149" x2="855" y2="169"/>
    <line x1="855" y1="177" x2="855" y2="197"/>
    <line x1="855" y1="205" x2="855" y2="225"/>
    <line x1="855" y1="233" x2="855" y2="253"/>
  </g>

  <!-- === TITLE / BRANDING === -->
  <text x="60" y="55" font-family="'Inter', 'Segoe UI', sans-serif" font-size="32" font-weight="800" fill="white" letter-spacing="-1">ai2videogen</text>
  <text x="60" y="75" font-family="'Inter', 'Segoe UI', sans-serif" font-size="13" fill="#6b7280" letter-spacing="0.5">Open-source • Runs locally • RTX 4090 optimized</text>

  <!-- Badges row -->
  <rect x="60" y="348" width="100" height="22" rx="4" fill="#1e1b4b" stroke="#4c1d95" stroke-width="1"/>
  <text x="110" y="363" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#a78bfa" font-weight="600">MIT License</text>

  <rect x="170" y="348" width="120" height="22" rx="4" fill="#0c1a3a" stroke="#1d4ed8" stroke-width="1"/>
  <text x="230" y="363" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#60a5fa" font-weight="600">ComfyUI API</text>

  <rect x="300" y="348" width="130" height="22" rx="4" fill="#0a1f1a" stroke="#065f46" stroke-width="1"/>
  <text x="365" y="363" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#34d399" font-weight="600">Wan 2.2 GGUF</text>

  <rect x="440" y="348" width="100" height="22" rx="4" fill="#1a0f0f" stroke="#7f1d1d" stroke-width="1"/>
  <text x="490" y="363" text-anchor="middle" font-family="'Inter', 'Segoe UI', sans-serif" font-size="11" fill="#f87171" font-weight="600">RTX 4090</text>
</svg>
